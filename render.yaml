services:
  - type: web
    name: nanotech-full
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/init_and_start.sh
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_SECRET_KEY
        sync: false
      - key: PORTAL_PASSWORD
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_CALLBACK_URL
        sync: false
      - key: GITHUB_ALLOWED_USERS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ZAP_DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: FINANCE_SCRAPER_TIMEOUT_SECONDS
        value: "12"
      - key: FINANCE_RESEARCH_MAX_OFFERS
        value: "6"
      - key: OPENAI_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL
        value: "gpt-5.4"
      - key: FINANCE_AI_SEARCH_CONTEXT
        value: "medium"
      - key: FINANCE_AI_TIMEOUT_SECONDS
        value: "45"
      - key: FINANCE_AI_MAX_OFFERS
        value: "6"
