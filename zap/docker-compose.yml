services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: zap_workflow
      MYSQL_USER: zap
      MYSQL_PASSWORD: zappass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql+pymysql://zap:zappass@db:3306/zap_workflow?charset=utf8mb4
      SECRET_KEY: change-me
      BOOTSTRAP_ADMIN_NAME: Administrador
      BOOTSTRAP_ADMIN_EMAIL: admin@empresa.com
      BOOTSTRAP_ADMIN_PASSWORD: trocar-agora
      UPLOAD_FOLDER: /app/instance/uploads
    ports:
      - "5000:8000"
    volumes:
      - app_instance:/app/instance

volumes:
  db_data:
  app_instance:
