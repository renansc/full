services:
  mysql:
    image: mysql:8.4
    container_name: nanoponto-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nanoponto}
      MYSQL_USER: ${MYSQL_USER:-nanoponto}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nanoponto}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nanoponto-root}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT_HOST:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  nanoponto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanoponto
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: 5000
      SECRET_KEY: ${SECRET_KEY:-nanoponto-docker-dev}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-America/Sao_Paulo}
      ALLOW_SYSTEM_TIME_FALLBACK: ${ALLOW_SYSTEM_TIME_FALLBACK:-1}
      DEFAULT_EMPLOYER_NAME: ${DEFAULT_EMPLOYER_NAME:-Nanotech}
      DEFAULT_EMPLOYER_DOCUMENT: ${DEFAULT_EMPLOYER_DOCUMENT:-4625190000100}
      DEFAULT_EMPLOYER_DOCUMENT_TYPE: ${DEFAULT_EMPLOYER_DOCUMENT_TYPE:-1}
      DEFAULT_EMPLOYEE_NAME: ${DEFAULT_EMPLOYEE_NAME:-Renan Santos Coutinho}
      DEFAULT_EMPLOYEE_CPF: ${DEFAULT_EMPLOYEE_CPF:-06587583903}
      DEFAULT_EMPLOYEE_CODE: ${DEFAULT_EMPLOYEE_CODE:-E001}
      DEFAULT_EMPLOYEE_BADGE_ID: ${DEFAULT_EMPLOYEE_BADGE_ID:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nanoponto}
      MYSQL_USER: ${MYSQL_USER:-nanoponto}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nanoponto}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@nanoponto.local}
    volumes:
      - nanoponto_data:/app/data
    restart: unless-stopped

volumes:
  mysql_data:
  nanoponto_data:
