services:
  - type: web
    name: NanoPonto
    env: python
    rootDir: NanoPonto
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: ALLOW_SYSTEM_TIME_FALLBACK
        value: "1"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: DEFAULT_EMPLOYER_NAME
        value: Nanotech
      - key: DEFAULT_EMPLOYER_DOCUMENT
        value: "4625190000100"
      - key: DEFAULT_EMPLOYEE_NAME
        value: Renan Santos Coutinho
      - key: DEFAULT_EMPLOYEE_CPF
        value: "06587583903"
