services:
  - type: web
    name: NanoPonto
    env: python
    rootDir: NanoPonto
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: ALLOW_SYSTEM_TIME_FALLBACK
        value: "1"
      - key: NANOPONTO_DATABASE_URL
        sync: false
      - key: NANOPONTO_MYSQL_HOST
        sync: false
      - key: NANOPONTO_MYSQL_PORT
        value: "3306"
      - key: NANOPONTO_MYSQL_DATABASE
        sync: false
      - key: NANOPONTO_MYSQL_USER
        sync: false
      - key: NANOPONTO_MYSQL_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: renanrocks2009@gmail.com
      - key: SMTP_PASSWORD
        value: ddax uske sdrn egfu
      - key: SMTP_FROM
        value: renanrocks2009@gmail.com
      - key: DEFAULT_EMPLOYER_NAME
        value: Nanotech
      - key: DEFAULT_EMPLOYER_DOCUMENT
        value: "46025190000100"
      - key: DEFAULT_EMPLOYEE_NAME
        value: Renan Santos Coutinho
      - key: DEFAULT_EMPLOYEE_CPF
        value: "06587583903"
